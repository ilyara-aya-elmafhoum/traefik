---
# ── 0. S'assurer que le groupe docker existe ─────────────────
- name: Vérifier que le groupe docker existe
  ansible.builtin.group:
    name: docker
    state: present

# ── 1. Créer l'arborescence ──────────────────────────────────
- name: Créer le répertoire Traefik
  ansible.builtin.file:
    path: "{{ traefik_base_dir }}"
    state: directory
    owner: root
    group: docker
    mode: "0750"

- name: Créer les sous-répertoires
  ansible.builtin.file:
    path: "{{ traefik_base_dir }}/{{ item }}"
    state: directory
    owner: root
    group: docker
    mode: "0750"
  loop:
    - dynamic
    - acme

- name: Créer les répertoires de logs
  ansible.builtin.file:
    path: /var/log/traefik
    state: directory
    owner: root
    group: docker
    mode: "0750"

# ── 2. Créer le fichier acme.json avec permissions strictes ──
- name: Créer acme.json
  ansible.builtin.file:
    path: "{{ traefik_base_dir }}/acme/acme.json"
    state: touch
    owner: root
    group: root
    mode: "0600"
  changed_when: false

# ── 3. Déployer la configuration statique Traefik ────────────
- name: Déployer traefik.yml (config statique)
  ansible.builtin.template:
    src: traefik.yml.j2
    dest: "{{ traefik_base_dir }}/traefik.yml"
    owner: root
    group: docker
    mode: "0640"
  notify: Redémarrer Traefik

# ── 4. Déployer le docker-compose.yml ────────────────────────
- name: Déployer docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ traefik_base_dir }}/docker-compose.yml"
    owner: root
    group: docker
    mode: "0640"
  notify: Redémarrer Traefik

# ── 5. Déployer le service systemd ───────────────────────────
- name: Déployer le service systemd traefik-stack
  ansible.builtin.template:
    src: traefik-stack.service.j2
    dest: /etc/systemd/system/traefik-stack.service
    owner: root
    group: root
    mode: "0644"

- name: Recharger systemd immédiatement
  ansible.builtin.systemd:
    daemon_reload: true

# ── 6. Pull de l'image Docker ────────────────────────────────
- name: Pull de l'image Traefik
  ansible.builtin.command: docker pull traefik:{{ traefik_version }}
  changed_when: false

# ── 7. Démarrer la stack ─────────────────────────────────────
- name: Démarrer la stack Traefik
  ansible.builtin.command: docker compose -f {{ traefik_base_dir }}/docker-compose.yml up -d --remove-orphans
  changed_when: false

# ── 8. Activer le service systemd ────────────────────────────
- name: Activer le service traefik-stack au boot
  ansible.builtin.systemd:
    name: traefik-stack
    enabled: true

# ── 9. Health check ──────────────────────────────────────────
- name: Attendre que Traefik réponde sur le port 443
  ansible.builtin.wait_for:
    port: 443
    host: "0.0.0.0"
    timeout: 120
    state: started

- name: Vérifier le dashboard Traefik
  ansible.builtin.uri:
    url: "http://127.0.0.1:8080/api/overview"
    method: GET
    status_code: 200
  register: traefik_health
  retries: 5
  delay: 10
  until: traefik_health.status == 200
