---
# =============================================================
# Playbook : Installation Traefik Reverse Proxy
# Exécuté via SemaphoreUI après provisionnement Terraform
#
# Variables attendues (injectées par SemaphoreUI) :
#   - traefik_acme_email : Email pour Let's Encrypt
# =============================================================

- name: Installer et configurer Traefik reverse proxy
  hosts: traefik
  become: true
  remote_user: ansible-boot

  pre_tasks:
    - name: Attendre la fin du cloud-init
      wait_for:
        path: /var/lib/cloud/instance/boot-finished
        timeout: 300

    - name: S'assurer que Docker est démarré
      systemd:
        name: docker
        state: started
        enabled: true

  roles:
    - traefik
