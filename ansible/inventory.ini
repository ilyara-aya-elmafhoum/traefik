[traefik]
traefik ansible_host={{ traefik_private_ip | default('10.0.0.XX') }} ansible_user=ansible-boot ansible_ssh_private_key_file={{ ansible_ssh_private_key_file }}

[traefik:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
